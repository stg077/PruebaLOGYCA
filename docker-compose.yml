version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: logyca_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logyca_sales
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: logyca_azurite
    command: azurite --skipApiVersionCheck --blobHost 0.0.0.0 --queueHost 0.0.0.0
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"

  api:
    build: .
    container_name: logyca_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    volumes:
      - .:/app

  worker:
    build: .
    container_name: logyca_worker
    command: python -m app.services.worker
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_started
    volumes:
      - .:/app

  n8n:
    image: n8nio/n8n
    container_name: logyca_n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - WEBHOOK_URL=http://localhost:5678/

volumes:
  postgres_data:
